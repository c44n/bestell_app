<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canorando</title>

    <link rel="shortcut icon" href="./images/" type="image/x-icon">

    <link rel="stylesheet" href="./styles/calculation.css">
    <link rel="stylesheet" href="./styles/meal.css">
    <link rel="stylesheet" href="./style.css">

    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js" defer></script>
</head>

<body onload="init()">
    <header>
        <section class="bg-primary">
            <div class="container_xl">
                <div class="header_wrapper">
                    <img src="./assets/images/ba_logo.png" alt="" class="logo">
                    <img src="./assets/icons/menu.svg" alt="" class="menu_icon">
                </div>
            </div>
        </section>
    </header>

    <main>
        <section class="hero">
            <div class="hero__cover"></div>
            <div class="container_xl">
                <div class="hero__restaurant_info">
                    <div class="restaurant_info__logo_wrapper">
                        <img src="./assets/images/burger_pb.png" alt="Restaurant Logo Image" class="restaurant_logo">
                    </div>
                    <div class="restaurant_info__name_desc_wrapper">
                        <div class="restaurant_name_wrapper">
                            <img src="./assets/images/BurgerHouse.png" alt="Restaurant Logo Text">
                            <div class="restaurant_review_wrapper">
                                <img src="./assets/icons/star.svg" width="20px" alt="Review Star Image">
                                <h4>4,1</h4>
                                <span class="review_sum">(317)</span>
                            </div>
                        </div>
                        <h3>The best Burgers, Pizza, and Greens, all in one great place.</h3>
                    </div>
                </div>
        </section>

        <section class="meal">
            <div class="basket_wrapper">
                <div class="basket__title">
                    <h3>Your Basket</h3>
                </div>


                <div id="basket_off" class="basket_off">
                    <h4>Nothing here yet. Go ahead and choose something delicious!</h4>
                    <img src="./assets/icons/shopping_cart.svg" width="80px">
                </div>

                <div id="basket_active" class="display-none">
                    <div class="basket__mealList" id="basket__mealList"></div>

                    <div class="basket__calculate">
                        <div id="subtotal" class="calc_wrapper">
                            <p>Subtotal</p><span class="num_wrapper">
                                <p id="subtotal_num">0,00</p>€
                            </span>
                        </div>
                        <div id="deliver_fee" class="calc_wrapper">
                            <p>Delivery Fee</p><span class="num_wrapper">
                                <p id="delivery_num">4.99</p>€
                            </span>
                        </div>
                        <hr class="hr">
                        <div id="deliver_fee" class="calc_wrapper">
                            <p><b>Total</b></p><span class="num_wrapper">
                                <p id="total_num">0,00</p>€
                            </span>
                        </div>
                    </div>

                    <div class="buy_btn_wrapper">
                        <button onclick="openDialog()" class="buy_btn">Buy Now (<span id="buy_btn_num"></span> €)</button>
                    </div>
                </div>
            </div>

            <div id="allMeals"></div>

        </section>

        <div class="dialog-wrapper" id="dialog_wrapper">
            <dialog class="deliver_dialog" id="delivereDialog">
                <header class="deliver_dialog__header">
                    <img class="dialog_close_btn" id="closeBtn" tabindex="0" src="./assets/icons/close.svg"
                        alt="Dialog Close Button" onclick="closeDialog()">
                </header>

                <section>
                    <div class="deliver_dialog_content_wrapper">
                        <img src="./assets/images/burger_deliver_car.png" widht="100px" class="deliver_dialog_image">
                        <h2>Order confirmed!</h2>
                        <h3>Your food is on the way!</h3>
                    </div>

                </section>

            </dialog>
        </div>

    </main>

    <footer>

    </footer>
</body>

</html>
